name: Deploy to Firebase via OIDC (Zero-Secret)
on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Compile Application Production Build
        run: npm run build --if-present

      - name: Authenticate to Google Cloud via OIDC
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIP_PROVIDER_STRING }}
          service_account: ${{ secrets.WIP_SERVICE_ACCOUNT }}

      - name: Deploy to Firebase Hosting & Functions
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
